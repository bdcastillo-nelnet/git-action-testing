name: Terraform

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        
      - name: Verify terraform installed
        run: |
          echo "PATH=$PATH"
          terraform -version || true
          which terraform || true

      - name: "fallback: install Terraform if missing"
        run: |
          if ! command -v terraform >/dev/null; then
            echo "Terraform not found — ensuring unzip/wget are available"
            sudo apt-get update -y || true
            sudo apt-get install -y wget unzip || true
            echo "Downloading Terraform v1.6.10"
            wget -qO /tmp/terraform.zip https://releases.hashicorp.com/terraform/1.6.10/terraform_1.6.10_linux_amd64.zip
            sudo unzip -o /tmp/terraform.zip -d /usr/local/bin
            sudo chmod +x /usr/local/bin/terraform || true
            terraform version || true
          else
            echo "Terraform already installed"
          fi

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform fmt check
        run: terraform fmt -check

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: github.event_name == 'push'
        run: terraform apply -input=false -auto-approve tfplan
