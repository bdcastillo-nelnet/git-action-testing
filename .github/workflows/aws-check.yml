name: AWS Credentials Check

on:
  workflow_dispatch:

jobs:
  check-aws:
    name: Verify AWS credentials
    runs-on: ubuntu-latest
    environment: AWS

    steps:
      - name: Confirm secrets are present
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "AWS_ACCESS_KEY_ID is NOT set"; exit 1
          else
            echo "AWS_ACCESS_KEY_ID is set (length: ${#AWS_ACCESS_KEY_ID})"
          fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "AWS_SECRET_ACCESS_KEY is NOT set"; exit 1
          else
            echo "AWS_SECRET_ACCESS_KEY is set (hidden)"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Who am I (STS)
        run: aws sts get-caller-identity
